<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #id1{
            background-color: aqua;
            color: black;
        }
    </style>
</head>
<body>
    <h2>TO-DO APP 2</h2>
    <button onclick="ram()">Click ME
    </button>
    <span id="id1"></span>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        
        async function ram(){
            async function ram(){
    const url = "https://dummyjson.com/todos"; 
    let k = document.getElementById("id1");

    k.innerHTML = "Loading...";

    try{
        let res = await axios.get(url);
        let todos = res.data.todos;

        let html = todos.slice(0, 5).map((todo) => {
            return `
                <div>
                    <p><b>${todo.todo}</b></p>
                    <p>Status: ${todo.completed ? "✅" : "❌"}</p>
                    <hr>
                </div>
            `;
        }).join("");   // 🔥 VERY IMPORTANT

        k.innerHTML = html;

    }
    catch(error){
        k.innerHTML = "Failed to Load ❌";
        console.log(error);
    }
}
        } ;

    </script>
    
</body>
</html>
